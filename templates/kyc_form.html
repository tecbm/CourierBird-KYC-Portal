<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courier Bird - Logistics Partner Onboarding</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            /* Premium Logistics/Cargo Background Image with Overlay */
            background: linear-gradient(rgba(15, 23, 42, 0.65), rgba(15, 23, 42, 0.65)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            padding: 40px 20px; 
            color: #1e293b; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container { 
            width: 100%;
            max-width: 650px; 
            margin: 0 auto; 
            /* Beautiful frosted glass effect (semi-transparent white) */
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2); 
            box-sizing: border-box;
        }
        .header { 
            text-align: center; 
            border-bottom: 2px solid #f1f5f9; 
            padding-bottom: 24px; 
            margin-bottom: 30px; 
        }
        .company-logo { 
            max-width: 180px; 
            height: auto; 
            margin-bottom: 12px; 
        }
        h2 { 
            color: #1e3a8a; 
            text-align: center; 
            margin: 5px 0; 
            font-size: 26px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p.sub { 
            text-align: center; 
            color: #475569; 
            font-size: 14px; 
            margin: 5px 0 0 0; 
            font-weight: 500;
        }
        .section-header { 
            font-weight: 700; 
            color: #2563eb; 
            margin: 30px 0 15px 0; 
            border-bottom: 2px solid #eff6ff; 
            padding-bottom: 8px; 
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 6px; 
            color: #334155;
        }
        input[type="text"], input[type="email"] { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }
        input[type="text"]:focus, input[type="email"]:focus {
            outline: none;
            border-color: #2563eb;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }
        input[type="file"] { 
            background: #f8fafc; 
            padding: 12px; 
            width: 100%; 
            border: 2px dashed #cbd5e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        input[type="file"]:hover {
            border-color: #2563eb;
            background: #f0fdf4;
        }
        .submit-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #1e3a8a, #2563eb); 
            color: white; 
            border: none; 
            padding: 15px; 
            font-size: 16px; 
            font-weight: 700; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .submit-btn:hover { 
            background: linear-gradient(135deg, #172554, #1d4ed8); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.3);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .red-note { 
            color: #dc2626; 
            font-size: 13px; 
            font-weight: 600; 
            margin-top: 8px; 
            display: block; 
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <!-- Courier Bird Logo Integration -->
        <img src="/static/images/logo.png" alt="Courier Bird Logo" class="company-logo">
        <h2>Courier Bird Portal</h2>
        <p class="sub">Logistics Partner KYC & Onboarding Verification Form</p>
    </div>

    <form action="/submit_kyc" method="POST" enctype="multipart/form-data">
        
        <div class="section-header">1. Company / Business Details</div>
        <div class="form-group">
            <label>Registered Business Name *</label>
            <input type="text" name="company_name" required placeholder="e.g. Courier Bird Associate">
        </div>
        <div class="form-group">
            <label>GSTIN (GST Number) *</label>
            <input type="text" name="gstin" required placeholder="15-digit GST Number">
        </div>
        <div class="form-group">
            <label>Company/Individual PAN *</label>
            <input type="text" name="pan" required placeholder="10-digit PAN (ABCDE1234F)">
        </div>

        <div class="section-header">2. Point of Contact</div>
        <div class="form-group">
            <label>Contact Person Name *</label>
            <input type="text" name="contact_person" required placeholder="Full Name">
        </div>
        <div class="form-group">
            <label>Mobile Number *</label>
            <input type="text" name="mobile" required placeholder="10-digit phone number">
        </div>
        <div class="form-group">
            <label>Email Address *</label>
            <input type="email" name="email" required placeholder="partner@domain.com">
        </div>

        <div class="section-header">3. Bank Account Details</div>
        <div class="form-group">
            <label>Bank Account Number *</label>
            <input type="text" name="bank_account" required placeholder="Account Number">
        </div>
        <div class="form-group">
            <label>IFSC Code *</label>
            <input type="text" name="ifsc_code" required placeholder="11-digit IFSC Code">
        </div>

        <div class="section-header">4. Document Uploads (PDF, JPG, PNG)</div>
        <div class="form-group">
            <label>GST Certificate Copy *</label>
            <input type="file" name="gst_doc" accept=".pdf, .jpg, .jpeg, .png" required>
        </div>
        <div class="form-group">
            <label>PAN Card Copy *</label>
            <input type="file" name="pan_doc" accept=".pdf, .jpg, .jpeg, .png" required>
        </div>
        <div class="form-group">
            <label>Aadhaar Card Copy (Front & Back) *</label>
            <input type="file" name="aadhaar_doc" accept=".pdf, .jpg, .jpeg, .png" required>
        </div>
        <div class="form-group">
            <label>Address Proof (Electricity Bill / Rent Agreement) *</label>
            <input type="file" name="address_doc" accept=".pdf, .jpg, .jpeg, .png" required>
        </div>
        <div class="form-group">
            <label>Signed Cheque in our Company Name *</label>
            <input type="file" name="cheque_doc" accept=".pdf, .jpg, .jpeg, .png" required>
            <span class="red-note">* Note: Please deliver original cheque to our representative.</span>
        </div>

        <button type="submit" class="submit-btn">Submit KYC Documents</button>
    </form>
</div>

</body>
</html>
